# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
  # default configuration for services in *this* file
  _defaults:
    autowire: true      # Automatically injects dependencies in your services.
    autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
    bind:
      string $projectDir: '%kernel.project_dir%'

  _instanceof:
    App\Service\LogsParser\LogTypeParser\LogTypeParserInterface:
      tags: ['app.log_parser.typed_log_parsers']

  # makes classes in src/ available to be used as services
  # this creates a service per class whose id is the fully-qualified class name
  App\:
    resource: '../src/'
    exclude:
      - '../src/DependencyInjection/'
      - '../src/Entity/'
      - '../src/Constant/'
      - '../src/Kernel.php'

  # add more service definitions when explicit configuration is needed
  # please note that last definitions always *replace* previous ones

  App\Client\DataDog\DataDogClient:
    arguments:
      $host: '%app.client.datadog.host%'
      $apiKey: '%env(string:DD_API_KEY)%'
      $appKey: '%env(string:DD_APP_KEY)%'

  App\Service\Sender\Sender:
    arguments:
      $apiKey: '%env(string:MASTER_KEY)%'

  App\Client\CloudWatch\CloudWatchClient:
    arguments:
      $client: '@aws.configured_cloudwatch_logs_client'

  aws.configured_cloudwatch_logs_client:
    class: Aws\CloudWatchLogs\CloudWatchLogsClient
    arguments:
      $args: '%app.client.cloudwatch.arguments%'

  App\Service\LogsParser\LogsParser:
    arguments:
      $parsers: !tagged_iterator 'app.log_parser.typed_log_parsers'

  # TODO: REDO ALL GUZZLE USAGES TO: https://symfony.com/doc/current/http_client.html
  GuzzleHttp\Client:
    shared: false